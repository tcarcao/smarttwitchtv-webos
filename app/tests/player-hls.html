<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player HLS — Twitch optimizations</title>
    <style>
        body { font-family: monospace; padding: 1em; }
        .pass { color: #2a7; }
        .fail { color: #c33; font-weight: bold; }
    </style>
</head>
<body>
<h1>Player HLS — Twitch optimizations</h1>
<div id="results"></div>
<div id="done" style="display:none">DONE</div>
<script src="../thirdparty/hls.min.js"></script>
<script src="../platform/Platform.js"></script>
<script src="../platform/PlatformDesktop.js"></script>
<script src="../platform/PlatformShim.js"></script>
<script src="../specific/PlayHLSPlatform.js"></script>
<script>
(function() {
    'use strict';
    var results = document.getElementById('results');
    function record(label, ok, detail) {
        var p = document.createElement('p');
        p.className = ok ? 'pass' : 'fail';
        p.textContent = (ok ? 'PASS: ' : 'FAIL: ') + label + (detail ? ' — ' + detail : '');
        results.appendChild(p);
    }

    // Record every XHR URL so tests can assert what was (not) fetched.
    var xhrLog = [];
    var origOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
        xhrLog.push(String(url));
        return origOpen.apply(this, arguments);
    };

    // Fake hosts deliberately do NOT match the platform ProxyLoader regex
    // (cloudfront/ttvnw/...), so requests go through the default XhrLoader
    // and show up in xhrLog. Variant URLs are absolute, like real usher
    // playlists.
    var FAKE_MASTER_URI = 'https://fake-usher.example.com/api/channel/hls/test.m3u8';
    var MANIFEST =
        '#EXTM3U\n' +
        '#EXT-X-STREAM-INF:BANDWIDTH=6000000,RESOLUTION=1920x1080,CODECS="avc1.640028,mp4a.40.2",FRAME-RATE=60.000,VIDEO="chunked"\n' +
        'https://fake-edge.example.com/v1/playlist/chunked.m3u8\n' +
        '#EXT-X-STREAM-INF:BANDWIDTH=3000000,RESOLUTION=1280x720,CODECS="avc1.4d401f,mp4a.40.2",FRAME-RATE=60.000,VIDEO="720p60"\n' +
        'https://fake-edge.example.com/v1/playlist/720p60.m3u8\n';

    function startCachedPlayer() {
        Platform.player.start({
            uri: FAKE_MASTER_URI,
            manifestString: MANIFEST,
            kind: 'live',
            rect: {fullscreen: true}
        });
        return Platform.player.getHlsInstance ? Platform.player.getHlsInstance() : null;
    }

    var tests = [];
    function runNext() {
        var t = tests.shift();
        if (!t) {
            document.getElementById('done').style.display = 'block';
            return;
        }
        var finished = false;
        function done() {
            if (finished) return;
            finished = true;
            try { Platform.player.stop(); } catch (e) { /* ignore */ }
            setTimeout(runNext, 50);
        }
        try {
            t(done);
        } catch (e) {
            record(t.name + ' (threw)', false, String(e));
            done();
        }
    }

    // ---- Task 1/2: cached manifest served to hls.js, no master refetch ----
    tests.push(function testCachedManifest(done) {
        xhrLog.length = 0;
        var h = startCachedPlayer();
        if (!h) {
            record('cached manifest: Platform.player.getHlsInstance() exposed', false, 'missing');
            done();
            return;
        }
        var parsed = false;
        h.on(window.Hls.Events.MANIFEST_PARSED, function() { parsed = true; });
        setTimeout(function() {
            var masterFetched = xhrLog.some(function(u) { return u.indexOf('fake-usher.example.com') !== -1; });
            record('cached manifest: master playlist NOT fetched over network', !masterFetched, 'xhr: ' + xhrLog.join(', '));
            record('cached manifest: MANIFEST_PARSED fired from cached string', parsed);
            record('cached manifest: 2 levels parsed', !!(h.levels && h.levels.length === 2), 'levels=' + (h.levels && h.levels.length));
            done();
        }, 2000);
    });

    tests.push(function testAbortCancelsPendingManifest(done) {
        // The loader class hls.js was configured with IS our cached
        // loader — exercise its contract directly: a pending cached
        // response must die when hls.js aborts/destroys the loader
        // (stop or channel-switch right after start), exactly like a
        // real in-flight XHR would.
        var h = startCachedPlayer();
        if (!h || !h.config || typeof h.config.loader !== 'function') {
            record('abort contract: cached loader class reachable via hls config', false);
            done();
            return;
        }
        var LoaderClass = h.config.loader;
        Platform.player.stop();

        var abortCalls = 0, destroyCalls = 0;
        var a = new LoaderClass({});
        a.load({type: 'manifest', url: 'https://fake-usher.example.com/x.m3u8'}, {}, {
            onSuccess: function() { abortCalls++; }
        });
        a.abort();
        var d = new LoaderClass({});
        d.load({type: 'manifest', url: 'https://fake-usher.example.com/x.m3u8'}, {}, {
            onSuccess: function() { destroyCalls++; }
        });
        d.destroy();
        setTimeout(function() {
            record('abort contract: onSuccess NOT fired after abort()', abortCalls === 0, 'calls=' + abortCalls);
            record('abort contract: onSuccess NOT fired after destroy()', destroyCalls === 0, 'calls=' + destroyCalls);
            done();
        }, 100);
    });

    // ---- Task 3: Twitch-tuned config, latency modes, speed adjustment ----
    tests.push(function testTwitchConfig(done) {
        var h = startCachedPlayer();
        var c = h && h.config;
        record('config: abrEwmaDefaultEstimate 6 Mbps', !!c && c.abrEwmaDefaultEstimate === 6000000, c && ('got ' + c.abrEwmaDefaultEstimate));
        record('config: testBandwidth disabled', !!c && c.testBandwidth === false);
        record('config: startFragPrefetch enabled', !!c && c.startFragPrefetch === true);
        record('config: default latency mode 1 → liveSyncDuration 2.5', !!c && c.liveSyncDuration === 2.5, c && ('got ' + c.liveSyncDuration));
        Platform.player.setLatencyMode(0);
        record('latency 0 (disabled) → liveSyncDuration 6', !!c && c.liveSyncDuration === 6, c && ('got ' + c.liveSyncDuration));
        Platform.player.setLatencyMode(2);
        record('latency 2 (lowest) → liveSyncDuration 1.5', !!c && c.liveSyncDuration === 1.5, c && ('got ' + c.liveSyncDuration));
        Platform.player.setLatencyMode(1);
        record('latency 1 (normal) → liveSyncDuration 2.5', !!c && c.liveSyncDuration === 2.5, c && ('got ' + c.liveSyncDuration));
        record('latency: liveMaxLatencyDuration > liveSyncDuration', !!c && c.liveMaxLatencyDuration > c.liveSyncDuration);
        var hasSpeedApi = typeof Platform.player.setSpeedAdjustment === 'function';
        record('speedAdjustment: Platform.player.setSpeedAdjustment exists', hasSpeedApi);
        if (hasSpeedApi) {
            Platform.player.setSpeedAdjustment(true);
            record('speedAdjustment on → maxLiveSyncPlaybackRate 1.08', !!c && c.maxLiveSyncPlaybackRate === 1.08, c && ('got ' + c.maxLiveSyncPlaybackRate));
            Platform.player.setSpeedAdjustment(false);
            record('speedAdjustment off → maxLiveSyncPlaybackRate 1', !!c && c.maxLiveSyncPlaybackRate === 1, c && ('got ' + c.maxLiveSyncPlaybackRate));
        }
        record('shim: Android.setSpeedAdjustment forwards to player', (function() {
            if (!hasSpeedApi || !window.Android) return false;
            window.Android.setSpeedAdjustment(true);
            var on = c && c.maxLiveSyncPlaybackRate === 1.08;
            window.Android.setSpeedAdjustment(false);
            return on;
        })());
        done();
    });

    // ---- Task 4: explicit quality selection ----
    // NOTE: h.nextLevel reads streamController.nextLevel (next buffered frag level),
    // which is always -1 in this test environment with no real media buffering.
    // The observable side-effect of the setter is levelController.manualLevelIndex
    // (exposed as h.levelController.manualLevel), which IS set synchronously.
    tests.push(function testSetQuality(done) {
        var h = startCachedPlayer();
        if (!h) { record('setQuality: hls instance', false); done(); return; }
        var parsed = false;
        h.on(window.Hls.Events.MANIFEST_PARSED, function() {
            parsed = true;
            var lc = h.levelController;
            Platform.player.setQuality(1);
            record('setQuality(1) → nextLevel 1', lc.manualLevelIndex === 1, 'manualLevelIndex=' + lc.manualLevelIndex);
            Platform.player.setQuality(-1);
            record('setQuality(-1) → auto (nextLevel -1)', lc.manualLevelIndex === -1, 'manualLevelIndex=' + lc.manualLevelIndex);
            Platform.player.setQuality(99);
            record('setQuality(out of range) → auto', lc.manualLevelIndex === -1, 'manualLevelIndex=' + lc.manualLevelIndex);
            done();
        });
        setTimeout(function() {
            if (!parsed) {
                record('setQuality: MANIFEST_PARSED before timeout', false, 'timed out');
                done();
            }
        }, 3000);
    });

    runNext();
})();
</script>
</body>
</html>
