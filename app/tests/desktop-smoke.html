<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PlatformDesktop smoke test</title>
    <style>
        body { font-family: monospace; padding: 1em; max-width: 900px; }
        .pass { color: #2a7; }
        .fail { color: #c33; font-weight: bold; }
        h2 { margin-top: 1.5em; border-bottom: 1px solid #ccc; }
        #video-container { margin-top: 1em; max-width: 480px; }
        video { width: 100%; background: #000; }
    </style>
</head>
<body>
<h1>PlatformDesktop smoke test</h1>
<div id="results"></div>
<div id="video-container"></div>

<!-- hls.js + Platform stack (mirrors index.html ordering) -->
<script src="../thirdparty/hls.min.js"></script>
<script src="../platform/Platform.js"></script>
<script src="../platform/PlatformShim.js"></script>
<script src="../platform/PlatformDesktop.js"></script>

<script>
(function() {
    var results = document.getElementById('results');
    function record(label, ok, detail) {
        var p = document.createElement('p');
        p.className = ok ? 'pass' : 'fail';
        p.textContent = (ok ? 'PASS: ' : 'FAIL: ') + label + (detail ? ' — ' + detail : '');
        results.appendChild(p);
    }
    function section(name) {
        var h = document.createElement('h2');
        h.textContent = name;
        results.appendChild(h);
    }

    section('Bootstrap');
    record('hls.js loaded (window.Hls)', typeof window.Hls === 'function');
    record('Hls.isSupported() === true', typeof window.Hls === 'function' && window.Hls.isSupported());
    record('PlatformDesktop registered (PlatformDesktopLoaded flag)', window['PlatformDesktopLoaded'] === true);

    section('device');
    record('device.name() returns non-empty string', typeof Platform.device.name() === 'string' && Platform.device.name().length > 0);
    record('device.manufacturer() === "Desktop"', Platform.device.manufacturer() === 'Desktop');
    record('device.systemVersion() returns non-empty string', typeof Platform.device.systemVersion() === 'string' && Platform.device.systemVersion().length > 0);
    record('device.isTV() === false', Platform.device.isTV() === false);
    record('device.appVersion() === "0.0.1"', Platform.device.appVersion() === '0.0.1');

    section('log');
    var logProbed = { info:false, warn:false, error:false };
    var origInfo = console.log, origWarn = console.warn, origError = console.error;
    console.log = function() { logProbed.info = true; origInfo.apply(console, arguments); };
    console.warn = function() { logProbed.warn = true; origWarn.apply(console, arguments); };
    console.error = function() { logProbed.error = true; origError.apply(console, arguments); };
    Platform.log.info('smoke info');
    Platform.log.warn('smoke warn');
    Platform.log.error('smoke error');
    console.log = origInfo; console.warn = origWarn; console.error = origError;
    record('log.info called console.log', logProbed.info === true);
    record('log.warn called console.warn', logProbed.warn === true);
    record('log.error called console.error', logProbed.error === true);

    section('storage');
    var SK = '_smoke_storage_key_' + Date.now();
    record('storage.get of missing key returns null', Platform.storage.get(SK) === null);
    Platform.storage.set(SK, {a: 1, b: 'two'});
    record('storage.set+get round-trips object', JSON.stringify(Platform.storage.get(SK)) === '{"a":1,"b":"two"}');
    Platform.storage.set(SK, 'plain string');
    record('storage.set+get round-trips string', Platform.storage.get(SK) === 'plain string');
    Platform.storage.remove(SK);
    record('storage.remove clears key', Platform.storage.get(SK) === null);

    section('capabilities');
    record('capabilities.multiPlayer still false', Platform.capabilities.multiPlayer === false);
    record('capabilities.hardwareHLS still false', Platform.capabilities.hardwareHLS === false);
    record('capabilities.surfaceBehindWebView still false', Platform.capabilities.surfaceBehindWebView === false);
    record('multiPlayer namespace still null', Platform.multiPlayer === null);
    record('notifications namespace still null', Platform.notifications === null);

    section('input');
    record('input.registerKeys() does not throw', (function() {
        try { Platform.input.registerKeys(); return true; } catch (e) { return false; }
    })());
    record('keyCodes.BACK === 8 (Backspace)', Platform.input.keyCodes.BACK === 8);
    record('keyCodes.UP === 38', Platform.input.keyCodes.UP === 38);
    record('keyCodes.DOWN === 40', Platform.input.keyCodes.DOWN === 40);
    record('keyCodes.LEFT === 37', Platform.input.keyCodes.LEFT === 37);
    record('keyCodes.RIGHT === 39', Platform.input.keyCodes.RIGHT === 39);
    record('keyCodes.ENTER === 13', Platform.input.keyCodes.ENTER === 13);
    record('keyCodes.PLAY === 32 (Space)', Platform.input.keyCodes.PLAY === 32);
    record('keyCodes.PAUSE === 32 (same as PLAY)', Platform.input.keyCodes.PAUSE === 32);
    record('keyCodes has at least 8 keys', Object.keys(Platform.input.keyCodes).length >= 8);

    section('player');
    var TEST_URI = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
    record('player.getState() === "idle" before start', Platform.player.getState() === 'idle');

    // Start playback. Then wait up to 10s for state to reach 'playing'.
    var playerErr = null;
    try {
        Platform.player.start({uri: TEST_URI, kind: 'live', rect: {fullscreen: false}});
    } catch (e) {
        playerErr = e;
    }
    record('player.start did not throw', playerErr === null, playerErr && playerErr.message);

    // Poll for 'playing' state. The smoke page deliberately doesn't block —
    // it appends a row when the state changes. Chrome MCP validation in
    // Task 6 polls evaluate_script until 'playing' is observed.
    var pollMs = 0;
    var pollInterval = setInterval(function() {
        pollMs += 250;
        var state = Platform.player.getState();
        if (state === 'playing') {
            clearInterval(pollInterval);
            record('player reached state="playing" within 10s', true, 'after ' + pollMs + 'ms');
            // Pause/resume sub-tests now that we know the player is healthy.
            Platform.player.pause();
            setTimeout(function() {
                record('pause then resume reaches state="paused"', Platform.player.getState() === 'paused');
                Platform.player.resume();
                setTimeout(function() {
                    record('resume reaches state="playing" again', Platform.player.getState() === 'playing');
                    Platform.player.stop();
                    record('stop reaches state="idle"', Platform.player.getState() === 'idle');
                }, 500);
            }, 500);
        } else if (pollMs >= 10000) {
            clearInterval(pollInterval);
            record('player reached state="playing" within 10s', false, 'last state: ' + state);
        }
    }, 250);
})();
</script>
</body>
</html>
